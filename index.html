<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>IE Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080c;--bg2:#0e0e14;--bg3:#14141e;--border:#1e1e2e;--text:#e4e2d8;--muted:#6a6878;--dim:#3a384a;--gold:#ffcc00;--gold-g:rgba(255,204,0,0.15);--purple:#a855f7;--purple-g:rgba(168,85,247,0.12);--cyan:#22d3ee;--cyan-g:rgba(34,211,238,0.1);--green:#34d399;--green-g:rgba(52,211,153,0.1);--amber:#fbbf24;--amber-g:rgba(251,191,36,0.1);--red:#f87171;--red-g:rgba(248,113,113,0.1);--blue:#60a5fa}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'Share Tech Mono',monospace}.orb{font-family:'Orbitron',sans-serif}
@keyframes gp{0%,100%{box-shadow:0 0 8px var(--gc),inset 0 0 8px var(--gc)}50%{box-shadow:0 0 24px var(--gc),0 0 48px var(--gc),inset 0 0 16px var(--gc)}}
@keyframes sc{0%{top:-2px}100%{top:100%}}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .35s ease-out both}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:6px 10px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.il{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}.iv{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mtw{text-align:center;padding:18px 16px 12px}
.mtl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:5px}
.mt{font-size:clamp(36px,10vw,54px);font-weight:900;letter-spacing:2px;line-height:1;transition:color .5s}
.mt.ov{color:var(--red)}.mt.dn{color:var(--green)}.mt.id{color:var(--dim)}
.sb{display:inline-block;margin-top:7px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid}
.pg{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:0 16px 12px}
.pb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 3px;text-align:center;transition:all .4s;position:relative;overflow:hidden}
.pb.ac{--gc:var(--pc);animation:gp 2s ease-in-out infinite}
.pb.ac::before{content:'';position:absolute;left:0;width:100%;height:2px;background:var(--pc);animation:sc 1.5s linear infinite;opacity:.6}
.pl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;transition:color .3s}
.pb.ac .pl{color:var(--pc)}
.ptm{font-size:clamp(13px,3.5vw,18px);font-weight:700;color:var(--dim);transition:color .3s}
.pb.ac .ptm{color:var(--pc)}
.ew{padding:0 16px 12px}.eb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.eh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.el{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ev{font-size:20px;font-weight:900;transition:color .5s}
.ebar{background:var(--bg);border-radius:5px;height:7px;overflow:hidden}.efill{height:100%;border-radius:5px;transition:width 1s,background .5s}
.em{display:flex;justify-content:space-between;font-size:8px;color:var(--dim);margin-top:2px}
.si{text-align:center;padding:0 16px 8px;font-size:9px;color:var(--dim)}
.si .dt{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 16px 7px}
.ab{padding:16px 10px;border-radius:10px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;border:2px solid var(--bc,var(--border));background:var(--bg3);color:var(--muted);transition:all .2s;-webkit-tap-highlight-color:transparent}
.ab:active{transform:scale(.96)}.ab.ac2{background:var(--bc);color:#fff;--gc:var(--bc);animation:gp 2s ease-in-out infinite}.ab:disabled{opacity:.3;cursor:not-allowed;animation:none}
.enb{display:block;width:calc(100% - 32px);margin:0 16px 14px;padding:14px;border-radius:10px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:2px;border:2px solid var(--red);background:var(--bg3);color:var(--red);-webkit-tap-highlight-color:transparent}
.enb:active{transform:scale(.97)}.enb.dn{border-color:var(--green);color:var(--green);background:rgba(52,211,153,0.08)}.enb:disabled{opacity:.25;cursor:not-allowed}
.sl{margin:0 16px 16px;background:var(--bg3);border:1px solid var(--green);border-radius:10px;padding:12px;position:relative;overflow:hidden}
.sl::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.sl h3{font-size:10px;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.st{width:100%;border-collapse:collapse;font-size:9px}.st th{text-align:left;padding:3px;border-bottom:1px solid var(--border);color:var(--muted);font-size:8px;text-transform:uppercase;white-space:nowrap}.st td{padding:5px 3px}
.sw{padding:16px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.stl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.adb{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:#fff;background:var(--purple);letter-spacing:1px}
.af{background:var(--bg3);border:1px solid var(--purple);border-radius:10px;padding:14px;margin-bottom:14px;position:relative;overflow:hidden}
.af::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg label{display:block;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.fg input,.fg select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 8px;border-radius:5px;font-size:11px;font-family:'Share Tech Mono',monospace}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--purple)}
.subm{width:100%;padding:9px;border-radius:7px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;color:#fff;background:var(--green);text-transform:uppercase;letter-spacing:2px}
.jc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;margin-bottom:5px}
.jc:active{border-color:var(--purple)}
.jct{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.jcd{font-size:13px;font-weight:900;color:var(--gold);letter-spacing:1px}
.jcm{font-size:9px;color:var(--cyan);border:1px solid rgba(34,211,238,0.3);padding:1px 6px;border-radius:3px}
.jci{font-size:11px;font-weight:600;margin-bottom:1px}.jcs{font-size:10px;color:var(--muted)}
.bb{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-family:'Share Tech Mono',monospace}
.er{display:flex;gap:12px;align-items:center;padding:5px 16px 8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ei{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.ei span{font-size:11px;font-weight:600}
.dl{font-size:10px;color:var(--blue);text-decoration:none;border:1px solid rgba(96,165,250,0.3);padding:3px 8px;border-radius:5px;margin-left:auto}
.lw{display:flex;align-items:center;justify-content:center;min-height:80vh;padding:20px}
.lb{background:var(--bg3);border:1px solid var(--gold);border-radius:14px;padding:24px;width:100%;max-width:340px;text-align:center;position:relative;overflow:hidden}
.lb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.lb h2{font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:4px}
.lb p{font-size:11px;color:var(--muted);margin-bottom:16px}
.lb input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:7px;font-size:12px;font-family:'Share Tech Mono',monospace;margin-bottom:10px}
.lb input:focus{outline:none;border-color:var(--gold)}
.lb button{width:100%;padding:9px;border-radius:7px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#000;background:var(--gold);text-transform:uppercase;letter-spacing:2px}
.le{color:var(--red);font-size:10px;margin-top:6px}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;padding:0 16px 16px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.mc:active{border-color:var(--purple)}
.mca{position:absolute;top:0;left:0;right:0;height:3px;border-radius:8px 8px 0 0}
.mn{font-size:13px;font-weight:900;letter-spacing:1px;margin-bottom:1px}
.ms{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.mie{font-size:10px;color:var(--gold);margin-bottom:1px}
.mp{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtm{font-size:15px;font-weight:700;margin-top:4px;letter-spacing:1px}
.midl{color:var(--dim);font-style:italic;font-size:10px;margin-top:4px}
.mty{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--bg);color:var(--muted);display:inline-block;margin-left:4px}
.ssg{display:flex;gap:6px;padding:12px 16px;flex-wrap:wrap}
.ssc{background:var(--bg3);border-radius:7px;padding:7px 12px;text-align:center;flex:1;min-width:70px}
.ssv{font-size:18px;font-weight:900}.ssl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:8px 20px;border-radius:8px;font-size:11px;font-weight:600;z-index:999;animation:fi .3s ease-out;pointer-events:none}
.toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// CONFIG
// ============================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbwQwQmVTclkU1__zxWXMRlXWQLlXJXxjqJYPDbAeAIKccU1ZUOom4No8YrRei4o_RkK/exec';
var MACHINES = ['VMC-1','VMC-2','VMC-3','VMC-4','VMC-5','VMC-6','VMC-7','HMC-1','HMC-2','HMC-3'];
var ADMIN_EMAILS = ['vicky@inderent.com','chiranjeev@inderent.com','raoinderjeet@yahoo.com','sachin.s@inderent.com'];
var SAVE_MS = 5 * 60 * 1000;

// ============================================================
// SAMPLE DATA (fallback when sheet is unreachable)
// ============================================================
var SAMPLE = {
  'PRD-0401': {ie:'IE-250529',client:'Skyroot Aerospace',part:'Flat Laminate 3600x2000',qty:2,op:'OP-160',machine:'HMC-1',estSetup:300,estCycle:720,drgLink:'#',operator:'Ravi K.',sts:'running',ap:'running',ph:{setup:4500,running:18200,qchold:600,breakdown:0},gs:Date.now()/1000-23300},
  'PRD-0402': {ie:'IE-250700',client:'Addverb',part:'Middle Mast H-11',qty:1,op:'OP-110',machine:'VMC-5',estSetup:180,estCycle:480,drgLink:'#',operator:'Sunil M.',sts:'running',ap:'setup',ph:{setup:3200,running:0,qchold:0,breakdown:0},gs:Date.now()/1000-3200},
  'PRD-0403': {ie:'IE-250660',client:'ISRO',part:'Interface Plate',qty:2,op:'OP-80',machine:'VMC-3',estSetup:120,estCycle:360,drgLink:'#',operator:'Amit S.',sts:'idle'}
};

var COL = {
  setup:     {c:'#a855f7', b:'rgba(168,85,247,0.08)', l:'Setup'},
  running:   {c:'#22d3ee', b:'rgba(34,211,238,0.08)', l:'Cutting'},
  qchold:    {c:'#fbbf24', b:'rgba(251,191,36,0.08)', l:'QC hold'},
  breakdown: {c:'#f87171', b:'rgba(248,113,113,0.08)', l:'Breakdown'}
};

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function fmt(s) {
  s = Math.max(0, Math.floor(s));
  return String(Math.floor(s/3600)).padStart(2,'0') + ':' +
         String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' +
         String(s%60).padStart(2,'0');
}
function fH(m) {
  var h = Math.floor(m/60), mm = m % 60;
  return mm ? h+'h '+mm+'m' : h+'h';
}
function $(i) { return document.getElementById(i); }
function e(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// Toast notification
function toast(msg, isErr) {
  var t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' err' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// ============================================================
// SAFE API HELPERS (handle GAS CORS properly)
// ============================================================
function apiGet(params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  var url = API_URL + '?' + qs;
  return fetch(url, { method: 'GET', redirect: 'follow' })
    .then(function(r) { return r.json(); });
}

function apiPost(data) {
  return fetch(API_URL, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); });
}

// ============================================================
// STATE
// ============================================================
var S = {
  v: 'sup',        // current view: 'sup' | 'op' | 'admin'
  pc: null,        // current production code
  j: null,         // current job object
  ap: null,        // active phase: 'setup'|'running'|'qchold'|'breakdown'|null
  ph: {setup:0, running:0, qchold:0, breakdown:0},
  gs: null,        // global start timestamp
  lt: null,        // last tick timestamp
  te: 0,           // total elapsed seconds
  done: false,
  sl: null,        // summary log after end
  sf: false,       // show allocate form
  aj: {},          // allocated jobs (local)
  ls: 0,           // last save timestamp
  ae: null,        // admin email
  operators: null, // cached operator list
  nextCode: null,  // cached next code
  adminTimer: null // admin refresh timer
};

var TI = null;  // tick interval
var SI = null;  // auto-save interval

// ============================================================
// LOCAL STORAGE helpers
// ============================================================
function savS() {
  if (!S.pc) return;
  try {
    localStorage.setItem('IES_' + S.pc, JSON.stringify({
      pc: S.pc, j: S.j, ap: S.ap,
      ph: {setup:S.ph.setup, running:S.ph.running, qchold:S.ph.qchold, breakdown:S.ph.breakdown},
      gs: S.gs, done: S.done, te: S.te, lt: S.lt
    }));
  } catch(x) {}
}

function ldS(c) {
  try {
    var r = localStorage.getItem('IES_' + c);
    if (!r) return null;
    var d = JSON.parse(r);
    if (d.done) return null;
    if (d.gs && d.ap && d.lt) {
      var gap = Date.now()/1000 - d.lt;
      d.ph[d.ap] = (d.ph[d.ap] || 0) + gap;
      d.te = Date.now()/1000 - d.gs;
      d.lt = Date.now()/1000;
    }
    return d;
  } catch(x) { return null; }
}

function clS(c) {
  try { localStorage.removeItem('IES_' + c); } catch(x) {}
}

// ============================================================
// AUTO-SAVE to Google Sheet
// ============================================================
function aS() {
  if (!S.pc || !S.gs || S.done || !API_URL) return;
  savS();
  apiPost({
    action: 'liveUpdate',
    productionCode: S.pc,
    ieNumber: S.j.ie,
    machine: S.j.machine,
    operator: S.j.operator,
    currentPhase: S.ap || 'idle',
    setupSec: Math.round(S.ph.setup),
    cycleSec: Math.round(S.ph.running),
    qcHoldSec: Math.round(S.ph.qchold),
    breakdownSec: Math.round(S.ph.breakdown),
    totalSec: Math.round(S.te),
    efficiency: cE(),
    estSetupMin: S.j.estSetup,
    estCycleMin: S.j.estCycle
  }).then(function() {
    S.ls = Date.now();
    uSI();
  }).catch(function(err) {
    console.warn('Auto-save failed:', err);
  });
}

// ============================================================
// EFFICIENCY CALC
// ============================================================
function cE() {
  var es = (S.j.estSetup + S.j.estCycle) * 60;
  return S.te > 0 ? Math.round((es / S.te) * 100) : 0;
}

// ============================================================
// SAVE INDICATOR
// ============================================================
function uSI() {
  var el = $('si');
  if (!el) return;
  if (!S.gs || S.done) { el.innerHTML = ''; return; }
  var a = S.ls ? Math.round((Date.now() - S.ls) / 1000) : 999;
  var c = a < 30 ? 'var(--green)' : a < 300 ? 'var(--amber)' : 'var(--red)';
  el.innerHTML = '<span class="dt" style="background:'+c+'"></span>' +
    (S.ls ? 'Saved ' + Math.round(a/60) + 'm ago' : 'Waiting...');
}

// ============================================================
// TICK (every second)
// ============================================================
function tk() {
  if (!S.gs || S.done) return;
  var n = Date.now() / 1000;
  if (S.ap && S.lt) S.ph[S.ap] += (n - S.lt);
  S.te = n - S.gs;
  S.lt = n;
  uTD();
  uSI();
}

// ============================================================
// SET PHASE
// ============================================================
function sP(p) {
  if (S.done) return;
  var n = Date.now() / 1000;
  if (S.ap && S.lt) S.ph[S.ap] += (n - S.lt);
  S.ap = p;
  S.lt = n;
  if (!S.gs) S.gs = n;
  savS();
  uOU();
  // Update status on sheet
  if (API_URL) {
    apiPost({ action: 'updateStatus', productionCode: S.pc, status: 'RUNNING' })
      .catch(function() {});
  }
}

// ============================================================
// END JOB
// ============================================================
function eJ() {
  if (S.done || !S.ap) return;
  var msg = 'Are you sure you want to END this job?\n\n' +
    'Setup: ' + fmt(S.ph.setup) + '\n' +
    'Cycle: ' + fmt(S.ph.running) + '\n' +
    'QC Hold: ' + fmt(S.ph.qchold) + '\n' +
    'Total: ' + fmt(S.te) + '\n\n' +
    'This action cannot be undone.';
  if (!confirm(msg)) return;

  var n = Date.now() / 1000;
  if (S.ap && S.lt) S.ph[S.ap] += (n - S.lt);
  S.te = n - S.gs;
  S.done = true;
  S.ap = null;
  var ef = cE();

  S.sl = {
    pc: S.pc, ie: S.j.ie, mc: S.j.machine, op: S.j.operator,
    su: Math.round(S.ph.setup), cy: Math.round(S.ph.running),
    qc: Math.round(S.ph.qchold), bd: Math.round(S.ph.breakdown),
    to: Math.round(S.te), ef: ef
  };

  if (API_URL) {
    apiPost({
      action: 'logTime',
      productionCode: S.pc,
      ieNumber: S.j.ie,
      machine: S.j.machine,
      operator: S.j.operator,
      setupSec: S.sl.su,
      cycleSec: S.sl.cy,
      qcHoldSec: S.sl.qc,
      breakdownSec: S.sl.bd,
      estSetupMin: S.j.estSetup,
      estCycleMin: S.j.estCycle
    }).then(function(d) {
      if (d.success) { S.sl.ok = true; uOU(); toast('Job logged successfully!'); }
    }).catch(function() {
      S.sl.err = true; uOU(); toast('Save failed - stored locally', true);
    });
  }

  clS(S.pc);
  if (SI) { clearInterval(SI); SI = null; }
  uOU();
}

// ============================================================
// ADMIN LOGIN
// ============================================================
function rAL() {
  $('app').innerHTML =
    '<div class="hdr"><div class="orb" style="font-size:13px;color:var(--gold);letter-spacing:2px">INDER ENTERPRISES</div></div>' +
    '<div class="lw"><div class="lb fi">' +
    '<h2 class="orb">Management access</h2>' +
    '<p>Enter your registered email</p>' +
    '<input id="ae" type="email" placeholder="your.email@inderent.com" autofocus>' +
    '<button onclick="cAL()">Login</button>' +
    '<div id="lerr"></div>' +
    '</div></div>';

function cAL() {

// ADMIN DASHBOARD
// ============================================================
function rAD() {
  // Clear any existing admin refresh timer
  if (S.adminTimer) { clearTimeout(S.adminTimer); S.adminTimer = null; }

  var all = Object.assign({}, SAMPLE, S.aj);
  var mm = {};
  MACHINES.forEach(function(m) {
    mm[m] = {n:m, ty: m.charAt(0)==='H'?'HMC':'VMC', s:'idle', j:null};
  });

  Object.keys(all).forEach(function(c) {
    var j = all[c];
    if ((j.sts === 'running') && j.machine && mm[j.machine]) {
      mm[j.machine].s = 'running';
      mm[j.machine].j = Object.assign({code:c}, j);
    }
  });

  var ru = 0;
  MACHINES.forEach(function(m) { if (mm[m].s === 'running') ru++; });

  $('app').innerHTML =
    '<div class="hdr">' +
      '<div>' +
        '<div class="orb" style="font-size:12px;color:var(--gold);letter-spacing:2px">INDER ENTERPRISES</div>' +
        '<div style="font-size:10px;color:var(--muted);margin-top:1px">All machines &mdash; live</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="font-size:9px;color:var(--muted)">' + e(S.ae) + '</span>' +
        '<button class="bb" onclick="aLO()">Logout</button>' +
      '</div>' +
    '</div>' +
    '<div class="ssg">' +
      '<div class="ssc"><div class="ssv orb" style="color:var(--cyan)">' + ru + '</div><div class="ssl">Running</div></div>' +
      '<div class="ssc"><div class="ssv orb" style="color:var(--dim)">' + (MACHINES.length-ru) + '</div><div class="ssl">Idle</div></div>' +
      '<div class="ssc"><div class="ssv orb" style="color:var(--gold)">' + MACHINES.length + '</div><div class="ssl">Total</div></div>' +
      '<div class="ssc"><div class="ssv orb" style="color:' + (ru/MACHINES.length>=0.7?'var(--green)':'var(--amber)') + '">' + Math.round(ru/MACHINES.length*100) + '%</div><div class="ssl">Util.</div></div>' +
    '</div>' +
    '<div style="padding:3px 16px 6px"><span class="stl">All machines</span></div>' +
    '<div class="mg">' +
    MACHINES.map(function(m, i) {
      var mc = mm[m];
      var ir = mc.s === 'running' && mc.j;
      var pc = ir && mc.j.ap && COL[mc.j.ap] ? COL[mc.j.ap].c : 'var(--dim)';
      var pl = ir && mc.j.ap && COL[mc.j.ap] ? COL[mc.j.ap].l : 'Idle';
      var el = ir && mc.j.gs ? Math.round(Date.now()/1000 - mc.j.gs) : 0;
      return '<div class="mc fi d' + (i%4+1) + '" onclick="' + (ir ? "aVJ('" + e(mc.j.code) + "')" : '') + '">' +
        '<div class="mca" style="background:' + (ir ? pc : 'var(--border)') + '"></div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<span class="mn orb" style="color:' + (ir?'var(--text)':'var(--dim)') + '">' + m + '</span>' +
          '<span class="mty">' + mc.ty + '</span>' +
        '</div>' +
        '<div class="ms" style="color:' + pc + '">' + pl + '</div>' +
        (ir ?
          '<div class="mie mono">' + e(mc.j.ie) + '</div>' +
          '<div class="mp">' + e(mc.j.part) + ' &middot; ' + e(mc.j.client) + '</div>' +
          '<div class="mtm mono" style="color:' + pc + '">' + fmt(el) + '</div>' +
          '<div style="font-size:8px;color:var(--muted);margin-top:1px">' + e(mc.j.operator) + '</div>'
        : '<div class="midl">No active job</div>') +
      '</div>';
    }).join('') +
    '</div>';

  // Fetch fresh data from sheet then schedule next refresh
  if (API_URL) {
    apiGet({action: 'getAllJobs'}).then(function(d) {
      if (d.success && d.jobs) {
        d.jobs.forEach(function(j) {
          SAMPLE[j.productionCode] = {
            ie: j.ieNumber, client: j.clientName, part: j.partName,
            qty: j.qty, op: j.operation, machine: j.machine,
            estSetup: j.estSetupMin, estCycle: j.estCycleMin,
            drgLink: j.drawingLink || '#', operator: j.operator,
            sts: j.status.toLowerCase()
          };
        });
      }
    }).catch(function(err) {
      console.warn('Failed to fetch jobs:', err);
    }).finally(function() {
      // Also fetch live status
      return apiGet({action: 'getLiveStatus'}).then(function(d) {
        if (d.success && d.machines) {
          d.machines.forEach(function(m) {
            Object.keys(SAMPLE).forEach(function(c) {
              if (SAMPLE[c].machine === m.machine) {
                SAMPLE[c].ap = m.currentPhase;
                SAMPLE[c].sts = (m.currentPhase === 'idle') ? 'idle' : 'running';
              }
            });
          });
        }
        // Re-render with fresh data, then schedule next
        if (S.ae && S.v !== 'op') {
          renderAdminUI();
        }
      }).catch(function() {});
    });
  }

  // Schedule next refresh (single timer, no overlap)
  S.adminTimer = setTimeout(function() {
    if (S.ae && S.v !== 'op') rAD();
  }, 60000);
}

  MACHINES.forEach(function(m) {

function aVJ(c) {
  var all = Object.assign({}, SAMPLE, S.aj);
  var j = all[c];
  if (!j) return;

  // Clear admin timer
  if (S.adminTimer) { clearTimeout(S.adminTimer); S.adminTimer = null; }

  S.v = 'op';
  S.pc = c;
  S.j = j;
  S.sl = null;

  var ss = ldS(c);
  if (ss) {
    S.ap = ss.ap;
    S.ph = {setup:ss.ph.setup, running:ss.ph.running, qchold:ss.ph.qchold, breakdown:ss.ph.breakdown};
    S.gs = ss.gs;
    S.te = ss.te;
    S.lt = ss.lt || Date.now()/1000;
    S.done = ss.done || false;
  } else {
    S.ap = j.ap || null;
    S.ph = j.ph ? {setup:j.ph.setup, running:j.ph.running, qchold:j.ph.qchold, breakdown:j.ph.breakdown}
                 : {setup:0, running:0, qchold:0, breakdown:0};
    S.gs = j.gs || null;
    S.te = S.gs ? Date.now()/1000 - S.gs : 0;
    S.lt = Date.now()/1000;
    S.done = false;
  }

  if (TI) clearInterval(TI);
  TI = setInterval(tk, 1000);
  if (SI) clearInterval(SI);
  SI = setInterval(aS, SAVE_MS);
  rOP();
}

function aLO() {
  S.ae = null;
  if (S.adminTimer) { clearTimeout(S.adminTimer); S.adminTimer = null; }
  try { localStorage.removeItem('IEA'); } catch(x) {}
  rSU();
}

// IE lookup (renamed to avoid collision with Apps Script function name)
function doLookupIE() {
  var ie = $('fi2') ? $('fi2').value.trim() : '';
  if (!ie || !API_URL) return;
  apiGet({action: 'lookupIE', ie: ie}).then(function(d) {
    if (d.success) {
      if ($('fcl')) $('fcl').value = d.client || '';
      if ($('fp')) $('fp').value = d.part || '';
    }
  }).catch(function() {});
}

function oAL() {
  var sv = null;
  try { sv = localStorage.getItem('IEA'); } catch(x) {}
  if (sv && ADMIN_EMAILS.indexOf(sv) >= 0) {
    S.ae = sv;
    S.v = 'admin';
    rAD();
  } else {
    rAL();
  }
}

function tF() {
  S.sf = !S.sf;
  rSU();
  if (S.sf) {
    setTimeout(function() {
      if (API_URL) {
        apiGet({action: 'getNextCode'}).then(function(d) {
          if (d.success && $('fc')) $('fc').value = d.nextCode;
        }).catch(function() {});
      }
    }, 100);
  }
}

function aJ() {
  var cEl = $('fc');
  var c = cEl ? cEl.value.trim() : '';
  if (!c) { toast('Production code is required', true); return; }

  var ie = $('fi2') ? $('fi2').value.trim() : '';
  if (!ie) { toast('IE number is required', true); return; }

  var jd = {
    ie: ie,
    client: $('fcl') ? $('fcl').value.trim() : '',
    part: $('fp') ? $('fp').value.trim() || 'Part' : 'Part',
    qty: parseInt($('fq') ? $('fq').value : '1') || 1,
    op: $('fop') ? $('fop').value.trim() : 'OP-40',
    machine: $('fm') ? $('fm').value : MACHINES[0],
    estSetup: parseInt($('fs') ? $('fs').value : '180') || 180,
    estCycle: parseInt($('fcy') ? $('fcy').value : '480') || 480,
    drgLink: '#',
    operator: $('fo') ? $('fo').value || 'Operator' : 'Operator',
    sts: 'idle'
  };

  S.aj[c] = jd;

  if (API_URL) {
    apiPost({
      action: 'allocateJob',
      productionCode: c,
      ieNumber: jd.ie,
      clientName: jd.client,
      partName: jd.part,
      machine: jd.machine,
      operation: jd.op,
      qty: jd.qty,
      operator: jd.operator,
      estSetupMin: jd.estSetup,
      estCycleMin: jd.estCycle
    }).then(function(d) {
      if (d.success) toast('Job allocated: ' + c);
    }).catch(function() {
      toast('Allocation saved locally', true);
    });
  }

  S.sf = false;
  S.nextCode = null;
  rSU();
}

// UPDATE TIMER DISPLAY
// ============================================================
function uTD() {
  var mt = $('mt');
  if (!mt) return;
  var es = (S.j.estSetup + S.j.estCycle) * 60;
  mt.textContent = fmt(S.te);
  mt.className = 'mt orb' + (S.done ? ' dn' : S.te > es ? ' ov' : S.ap ? '' : ' id');

  var pk = ['setup','running','qchold','breakdown'];
  pk.forEach(function(p, i) {
    var el = $('pt' + i);
    if (el) el.textContent = fmt(S.ph[p]);
  });

  var ef = cE();
  var ee = $('ep');
  if (ee && S.te > 0) {
    ee.textContent = ef + '%';
    ee.style.color = ef >= 90 ? 'var(--green)' : ef >= 70 ? 'var(--amber)' : 'var(--red)';
  }

  var fe = $('ef');
  if (fe) {
    var pc = Math.min(100, (S.te / es) * 100);
    fe.style.width = pc + '%';
    fe.style.background = ef >= 90 ? 'var(--green)' : ef >= 70 ? 'var(--amber)' : 'var(--red)';
  }
}

// ============================================================
// UPDATE OPERATOR UI (buttons, status, summary)
// ============================================================
function uOU() {
  var pk = ['setup','running','qchold','breakdown'];
  var lb = [['Start setup','Setup...'],['Start job','Cutting...'],['QC hold','QC hold...'],['Breakdown','Brkdown...']];

  pk.forEach(function(p, i) {
    var bx = $('pb' + i);
    if (bx) bx.className = 'pb' + (S.ap === p ? ' ac' : '');
    var bt = $('b' + i);
    if (bt) {
      bt.className = 'ab' + (S.ap === p ? ' ac2' : '');
      bt.disabled = S.done;
      bt.textContent = S.ap === p ? lb[i][1] : lb[i][0];
    }
  });

  var eb = $('be');
  if (eb) {
    eb.disabled = S.done || !S.ap;
    eb.className = 'enb' + (S.done ? ' dn' : '');
    eb.textContent = S.done ? 'Job completed' : 'End job';
  }

  var ld = $('ld'), st = $('st');
  if (ld && st) {
    if (S.done) {
      ld.style.background = 'var(--green)';
      st.style.color = 'var(--green)';
      st.textContent = 'Done';
    } else if (S.ap) {
      var c = COL[S.ap];
      ld.style.background = c.c;
      st.style.color = c.c;
      st.textContent = c.l;
    } else {
      ld.style.background = 'var(--dim)';
      st.style.color = 'var(--muted)';
      st.textContent = 'Waiting';
    }
  }

  var bw = $('sbw');
  if (bw) {
    if (S.ap && !S.done) {
      var c2 = COL[S.ap];
      bw.innerHTML = '<span class="sb" style="color:'+c2.c+';border-color:'+c2.c+';background:'+c2.b+'">'+c2.l+'</span>';
    } else if (S.done) {
      bw.innerHTML = '<span class="sb" style="color:var(--green);border-color:var(--green);background:var(--green-g)">Done</span>';
    } else {
      bw.innerHTML = '';
    }
  }

  uTD();
  uSI();

  // Summary log
  if (S.sl) {
    var s = S.sl, la = $('sla');
    if (la) {
      la.innerHTML =
        '<div class="sl fi"><h3>' + (s.ok ? 'Logged to Sheet' : 'Saving...') + '</h3>' +
        '<table class="st"><thead><tr>' +
          '<th>IE</th><th>Machine</th><th>Setup</th><th>Cycle</th><th>QC</th><th>Brkdn</th><th>Total</th><th>Eff</th>' +
        '</tr></thead><tbody><tr>' +
          '<td class="mono" style="color:var(--gold)">' + e(s.ie) + '</td>' +
          '<td>' + e(s.mc) + '</td>' +
          '<td style="color:var(--purple)">' + fmt(s.su) + '</td>' +
          '<td style="color:var(--cyan)">' + fmt(s.cy) + '</td>' +
          '<td style="color:var(--amber)">' + fmt(s.qc) + '</td>' +
          '<td style="color:var(--red)">' + fmt(s.bd) + '</td>' +
          '<td style="font-weight:700">' + fmt(s.to) + '</td>' +
          '<td style="color:' + (s.ef>=90?'var(--green)':s.ef>=70?'var(--amber)':'var(--red)') + ';font-weight:900">' + s.ef + '%</td>' +
        '</tr></tbody></table>' +
        (s.err ? '<p style="font-size:9px;color:var(--red);margin-top:6px">WiFi error. Saved locally.</p>' : '') +
        (s.ok ? '<p style="font-size:9px;color:var(--green);margin-top:6px">Successfully logged.</p>' : '') +
        '</div>';
    }
  }
}

// ============================================================
// GO BACK
// ============================================================
function gB() {
  if (TI) { clearInterval(TI); TI = null; }
  if (SI) { clearInterval(SI); SI = null; }
  savS();
  S.v = 'sup';
  S.pc = null;
  S.j = null;
  S.sl = null;
  if (S.ae) {
    S.v = 'admin';
    rAD();
  } else {
    rSU();
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  var p = new URLSearchParams(window.location.search);
  var c = p.get('code'), m = p.get('mode');

  if (m === 'admin') {
    oAL();
    return;
  }

  if (c) {
    if (API_URL) {
      apiGet({action: 'getJob', code: c}).then(function(d) {
        if (d.success && d.job) {
          var j = d.job;
          SAMPLE[c] = {
            ie: j.ieNumber, client: j.clientName, part: j.partName,
            qty: j.qty, op: j.operation, machine: j.machine,
            estSetup: j.estSetupMin, estCycle: j.estCycleMin,
            drgLink: j.drawingLink || '#', operator: j.operator,
            sts: 'idle'
          };
        }
        oOP(c);
      }).catch(function() {
        if (SAMPLE[c]) oOP(c); else rSU();
      });
    } else if (SAMPLE[c]) {
      oOP(c);
    } else {
      rSU();
    }
  } else {
    rSU();
  }
}

init();
</script>
</body>
</html>
