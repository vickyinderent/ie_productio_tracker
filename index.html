<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>IE Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08080c;--bg2:#0e0e14;--bg3:#14141e;--border:#1e1e2e;
--text:#e4e2d8;--muted:#6a6878;--dim:#3a384a;
--gold:#ffcc00;--gold-g:rgba(255,204,0,0.15);
--purple:#a855f7;--purple-g:rgba(168,85,247,0.12);
--cyan:#22d3ee;--cyan-g:rgba(34,211,238,0.1);
--green:#34d399;--green-g:rgba(52,211,153,0.1);
--amber:#fbbf24;--amber-g:rgba(251,191,36,0.1);
--red:#f87171;--red-g:rgba(248,113,113,0.1);
--blue:#60a5fa;
}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'Share Tech Mono',monospace}
.orb{font-family:'Orbitron',sans-serif}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px var(--gc),inset 0 0 8px var(--gc)}50%{box-shadow:0 0 24px var(--gc),0 0 48px var(--gc2,transparent),inset 0 0 16px var(--gc)}}
@keyframes text-glow{0%,100%{text-shadow:0 0 8px var(--gc)}50%{text-shadow:0 0 20px var(--gc),0 0 40px var(--gc)}}
@keyframes scan{0%{top:-2px}100%{top:100%}}
@keyframes fade-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in .4s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.logo{font-size:15px;font-weight:700;letter-spacing:2px;color:var(--gold)}
.logo span{color:var(--muted);font-weight:400;font-size:12px;letter-spacing:0}

.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border)}
.info-cell{padding:2px 0}
.info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.info-value{font-size:14px;font-weight:600;color:var(--text)}
.info-value.gold{color:var(--gold)}
.info-value.cyan{color:var(--cyan)}
.info-value.purple{color:var(--purple)}

.main-timer-wrap{text-align:center;padding:30px 20px 20px;position:relative}
.main-timer-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:8px}
.main-timer{font-size:72px;font-weight:900;letter-spacing:6px;line-height:1;transition:color .5s;--gc:var(--cyan)}
.main-timer.overrun{color:var(--red);--gc:var(--red)}
.main-timer.done{color:var(--green);--gc:var(--green)}
.main-timer.idle{color:var(--dim)}
.status-badge{display:inline-block;margin-top:10px;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid;transition:all .3s}

.phase-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 20px 20px}
.phase-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;transition:all .4s;position:relative;overflow:hidden}
.phase-box.active{--gc:var(--pc);--gc2:var(--pc);animation:glow-pulse 2s ease-in-out infinite}
.phase-box.active::before{content:'';position:absolute;left:0;width:100%;height:2px;background:var(--pc);animation:scan 1.5s linear infinite;opacity:.6}
.phase-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;transition:color .3s}
.phase-box.active .phase-label{color:var(--pc)}
.phase-time{font-size:24px;font-weight:700;color:var(--dim);transition:color .3s}
.phase-box.active .phase-time{color:var(--pc);--gc:var(--pc);animation:text-glow 2s ease-in-out infinite}

.eff-wrap{padding:0 20px 20px}
.eff-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 18px}
.eff-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.eff-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.eff-value{font-size:28px;font-weight:900;transition:color .5s}
.eff-bar{background:var(--bg);border-radius:8px;height:10px;overflow:hidden;position:relative}
.eff-fill{height:100%;border-radius:8px;transition:width 1s ease,background .5s}
.eff-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px}

.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 12px}
.action-btn{padding:22px 16px;border-radius:14px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;border:2px solid var(--bc,var(--border));background:var(--bg3);color:var(--muted);transition:all .25s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.action-btn:active{transform:scale(.97)}
.action-btn.active{background:var(--bc);color:#fff;--gc:var(--bc);--gc2:var(--bc);animation:glow-pulse 2s ease-in-out infinite}
.action-btn:disabled{opacity:.3;cursor:not-allowed;animation:none}
.end-btn{grid-column:1/-1;padding:20px;border-radius:14px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:3px;border:2px solid var(--red);background:var(--bg3);color:var(--red);transition:all .25s;margin:0 20px 20px;-webkit-tap-highlight-color:transparent}
.end-btn:active{transform:scale(.97)}
.end-btn.done{border-color:var(--green);color:var(--green);background:rgba(52,211,153,0.08)}
.end-btn:disabled{opacity:.25;cursor:not-allowed}

.sheet-log{margin:0 20px 20px;background:var(--bg3);border:1px solid var(--green);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.sheet-log::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.sheet-log h3{font-size:12px;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.sheet-table{width:100%;border-collapse:collapse;font-size:11px}
.sheet-table th{text-align:left;padding:6px;border-bottom:1px solid var(--border);color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.sheet-table td{padding:8px 6px;color:var(--text)}
.sheet-table .val-gold{color:var(--gold)}
.sheet-table .val-purple{color:var(--purple)}
.sheet-table .val-cyan{color:var(--cyan)}
.sheet-table .val-amber{color:var(--amber)}
.sheet-table .val-red{color:var(--red)}
.sheet-table .val-green{color:var(--green)}

.sup-wrap{padding:20px}
.sup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sup-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.add-btn{padding:8px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#fff;background:var(--purple);letter-spacing:1px;transition:all .2s}
.add-btn:hover{box-shadow:0 0 20px var(--purple-g)}

.alloc-form{background:var(--bg3);border:1px solid var(--purple);border-radius:14px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.alloc-form::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.form-group label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.form-group input,.form-group select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:13px;font-family:'Share Tech Mono',monospace;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--purple);box-shadow:0 0 12px var(--purple-g)}
.submit-btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;background:var(--green);text-transform:uppercase;letter-spacing:2px;transition:all .2s}
.submit-btn:hover{box-shadow:0 0 24px var(--green-g)}

.job-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .2s;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;margin-bottom:8px}
.job-card:hover{border-color:var(--purple);box-shadow:0 0 20px var(--purple-g)}
.job-code{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:1px;text-align:center}
.job-machine{font-size:10px;color:var(--muted);margin-top:2px;text-align:center}
.job-info-primary{font-size:14px;color:var(--text);font-weight:600}
.job-info-secondary{font-size:12px;color:var(--muted);margin-top:2px}
.job-est{text-align:right}
.job-est div{font-size:12px}

.drg-link{font-size:12px;color:var(--blue);text-decoration:none;border:1px solid rgba(96,165,250,0.3);padding:5px 14px;border-radius:8px;transition:all .2s;display:inline-block;margin-top:8px}
.drg-link:hover{background:rgba(96,165,250,0.1);box-shadow:0 0 12px rgba(96,165,250,0.2)}

.est-row{display:flex;gap:20px;align-items:center;margin-top:10px}
.est-item{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.est-item span{font-size:13px;font-weight:600}

.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:20px}
.info-box h4{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.info-box p{font-size:12px;color:var(--dim);line-height:1.8}
.info-box .hl{color:var(--blue)}

.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Share Tech Mono',monospace;transition:border-color .2s}
.back-btn:hover{border-color:var(--gold)}

.live-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ========== CONFIG ==========
const API_URL = 'https://script.google.com/macros/s/AKfycbxt-b9vdzRQMMlO871CZd-5nsDrwPR4CALgEQuNhw-fhnFJUhOld8anAL63WNPtAb25/exec'; // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
const MACHINES = ['VMC-1','VMC-2','VMC-3','VMC-4','VMC-5','VMC-6','VMC-7','HMC-1','HMC-2','HMC-3'];

const SAMPLE_JOBS = {
  'PRD-0401':{ie:'IE-250529',client:'Skyroot Aerospace',part:'Flat Laminate 3600x2000',qty:2,op:'OP-160',machine:'HMC-1',estSetup:300,estCycle:720,drgLink:'https://drive.google.com/file/d/xxx',operator:'Ravi K.'},
  'PRD-0402':{ie:'IE-250700',client:'Addverb Technologies',part:'Middle Mast H-11 mtr',qty:1,op:'OP-110',machine:'VMC-5',estSetup:180,estCycle:480,drgLink:'https://drive.google.com/file/d/yyy',operator:'Sunil M.'},
  'PRD-0403':{ie:'IE-250660',client:'ISRO',part:'Interface Plate',qty:2,op:'OP-80',machine:'VMC-3',estSetup:120,estCycle:360,drgLink:'https://drive.google.com/file/d/zzz',operator:'Amit S.'}
};

const COLORS = {
  setup:{color:'#a855f7',bg:'rgba(168,85,247,0.08)',label:'Setup'},
  running:{color:'#22d3ee',bg:'rgba(34,211,238,0.08)',label:'Cutting'},
  qchold:{color:'#fbbf24',bg:'rgba(251,191,36,0.08)',label:'QC hold'},
  breakdown:{color:'#f87171',bg:'rgba(248,113,113,0.08)',label:'Breakdown'}
};

// ========== HELPERS ==========
function fmt(s){s=Math.max(0,Math.floor(s));const h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor((s%3600)/60)).padStart(2,'0'),sec=String(s%60).padStart(2,'0');return h+':'+m+':'+sec}
function fmtHM(min){const h=Math.floor(min/60),m=min%60;return m?h+'h '+m+'m':h+'h'}
function fmtSec(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return m?h+'h '+m+'m':h+'h'}
function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ========== STATE ==========
let state = {
  view:'supervisor', prodCode:null, job:null,
  activePhase:null, phases:{setup:0,running:0,qchold:0,breakdown:0},
  globalStart:null, lastTick:null, totalElapsed:0, isDone:false,
  sheetLog:null, showForm:false, allocatedJobs:{}
};
let tickInterval = null;

// ========== TIMER ENGINE ==========
function tick(){
  if(!state.globalStart||state.isDone)return;
  const now=Date.now()/1000;
  if(state.activePhase&&state.lastTick){
    state.phases[state.activePhase]+=(now-state.lastTick);
  }
  state.totalElapsed=now-state.globalStart;
  state.lastTick=now;
  updateTimerDisplay();
}

function startPhase(phase){
  if(state.isDone)return;
  const now=Date.now()/1000;
  if(state.activePhase&&state.lastTick){
    state.phases[state.activePhase]+=(now-state.lastTick);
  }
  state.activePhase=phase;
  state.lastTick=now;
  if(!state.globalStart)state.globalStart=now;
  updateOperatorUI();
  // Update status in Sheet
  if(API_URL){
    fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'updateStatus',productionCode:state.prodCode,status:'RUNNING'})
    }).catch(()=>{});
  }
}

function endJob(){
  if(state.isDone||!state.activePhase)return;
  const now=Date.now()/1000;
  if(state.activePhase&&state.lastTick){
    state.phases[state.activePhase]+=(now-state.lastTick);
  }
  state.totalElapsed=now-state.globalStart;
  state.isDone=true;
  state.activePhase=null;
  const estTotalSec=(state.job.estSetup+state.job.estCycle)*60;
  const eff=state.totalElapsed>0?Math.round((estTotalSec/state.totalElapsed)*100):0;
  state.sheetLog={
    prodCode:state.prodCode,ie:state.job.ie,machine:state.job.machine,operator:state.job.operator,
    setup:Math.round(state.phases.setup),cycle:Math.round(state.phases.running),
    qchold:Math.round(state.phases.qchold),breakdown:Math.round(state.phases.breakdown),
    total:Math.round(state.totalElapsed),efficiency:eff,
    estSetupMin:state.job.estSetup,estCycleMin:state.job.estCycle
  };
  // Send to Google Sheet
  if(API_URL){
    fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({
        action:'logTime',productionCode:state.prodCode,ieNumber:state.job.ie,
        machine:state.job.machine,operator:state.job.operator,
        setupSec:state.sheetLog.setup,cycleSec:state.sheetLog.cycle,
        qcHoldSec:state.sheetLog.qchold,breakdownSec:state.sheetLog.breakdown,
        estSetupMin:state.job.estSetup,estCycleMin:state.job.estCycle
      })
    }).then(r=>r.json()).then(d=>{
      if(d.success){state.sheetLog.sent=true;updateOperatorUI();}
    }).catch(()=>{state.sheetLog.sent=false;state.sheetLog.error=true;updateOperatorUI();});
  }
  updateOperatorUI();
}

// ========== RENDER: SUPERVISOR ==========
function renderSupervisor(){
  const allJobs={...SAMPLE_JOBS,...state.allocatedJobs};
  const entries=Object.entries(allJobs);
  let formHTML='';
  if(state.showForm){
    formHTML=`
    <div class="alloc-form fade-in">
      <div class="form-grid">
        <div class="form-group"><label>Production code</label><input id="f-code" placeholder="PRD-0404" class="mono"></div>
        <div class="form-group"><label>IE number</label><input id="f-ie" placeholder="IE-250XXX" class="mono"></div>
        <div class="form-group"><label>Client name</label><input id="f-client" placeholder="Skyroot / ISRO / Addverb"></div>
        <div class="form-group"><label>Part name</label><input id="f-part" placeholder="Base Plate Mold"></div>
        <div class="form-group"><label>Operator</label><input id="f-operator" placeholder="Ravi K."></div>
        <div class="form-group"><label>Qty</label><input id="f-qty" value="1" type="number" min="1"></div>
      </div>
      <div class="form-grid-4">
        <div class="form-group"><label>Machine</label><select id="f-machine">${MACHINES.map(m=>`<option value="${m}">${m}</option>`).join('')}</select></div>
        <div class="form-group"><label>Operation</label><input id="f-op" value="OP-40" class="mono"></div>
        <div class="form-group"><label>Est. setup (min)</label><input id="f-setup" value="180" type="number"></div>
        <div class="form-group"><label>Est. cycle (min)</label><input id="f-cycle" value="480" type="number"></div>
      </div>
      <button class="submit-btn" onclick="allocateJob()">Allocate production code</button>
    </div>`;
  }

  $('app').innerHTML=`
  <div class="header">
    <div>
      <div class="logo orb">INDER ENTERPRISES</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">Production control &mdash; supervisor dashboard</div>
    </div>
    <div class="mono" style="text-align:right;font-size:12px;color:var(--muted)">${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}<br>${new Date().toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})}</div>
  </div>
  <div class="sup-wrap">
    <div class="sup-header">
      <span class="sup-title">Allocate new job</span>
      <button class="add-btn" onclick="toggleForm()">${state.showForm?'Cancel':'+ New production code'}</button>
    </div>
    ${formHTML}
    <div class="sup-title" style="margin-bottom:12px">Active production codes</div>
    ${entries.map(([code,j],i)=>`
      <div class="job-card fade-in d${Math.min(i+1,5)}" onclick="openOperator('${esc(code)}')">
        <div>
          <div class="job-code orb">${esc(code)}</div>
          <div class="job-machine mono">${esc(j.machine)}</div>
        </div>
        <div>
          <div class="job-info-primary">${esc(j.ie)} &mdash; ${esc(j.part)}</div>
          <div class="job-info-secondary">${esc(j.client)} &middot; ${esc(j.op)} &middot; Qty: ${j.qty} &middot; ${esc(j.operator)}</div>
        </div>
        <div class="job-est">
          <div style="color:var(--purple)">Setup: ${fmtHM(j.estSetup)}</div>
          <div style="color:var(--cyan)">Cycle: ${fmtHM(j.estCycle)}</div>
        </div>
      </div>
    `).join('')}
    <div class="info-box fade-in d5">
      <h4>QR code for operators</h4>
      <p>Each production code generates a QR code URL: <span class="hl mono">yoursite.com/tracker.html?code=PRD-0401</span><br>
      Operator scans with phone camera, opens the operator dashboard with all job details pre-filled.<br>
      Print QR stickers and stick on the route card (IE-PD-01).</p>
    </div>
    <div class="info-box fade-in d5" style="margin-top:12px">
      <h4>Google Sheet columns (auto-logged)</h4>
      <table class="sheet-table"><thead><tr>
        <th>Prod code</th><th>IE no.</th><th>Machine</th><th>Operator</th><th>Setup</th><th>Cycle</th><th>QC hold</th><th>Breakdown</th><th>Total</th><th>Eff. %</th>
      </tr></thead><tbody><tr>
        <td class="val-gold mono">PRD-0401</td><td>IE-250529</td><td>HMC-1</td><td>Ravi K.</td>
        <td class="val-purple">2h 15m</td><td class="val-cyan">8h 30m</td><td class="val-amber">0h 30m</td><td class="val-red">0h 0m</td><td style="font-weight:700">11h 15m</td><td class="val-green" style="font-weight:700">91%</td>
      </tr></tbody></table>
    </div>
  </div>`;
}

function toggleForm(){state.showForm=!state.showForm;renderSupervisor();}

function allocateJob(){
  const code=$('f-code').value.trim(),ie=$('f-ie').value.trim(),client=$('f-client').value.trim();
  if(!code||!ie||!client){alert('Fill production code, IE number, and client name');return;}
  state.allocatedJobs[code]={
    ie,client,part:$('f-part').value.trim()||'Part',qty:parseInt($('f-qty').value)||1,
    op:$('f-op').value.trim(),machine:$('f-machine').value,
    estSetup:parseInt($('f-setup').value)||180,estCycle:parseInt($('f-cycle').value)||480,
    drgLink:'#',operator:$('f-operator').value.trim()||'Operator'
  };
  state.showForm=false;
  renderSupervisor();
}

function openOperator(code){
  const allJobs={...SAMPLE_JOBS,...state.allocatedJobs};
  const job=allJobs[code];
  if(!job)return;
  state.view='operator';state.prodCode=code;state.job=job;
  state.activePhase=null;state.phases={setup:0,running:0,qchold:0,breakdown:0};
  state.globalStart=null;state.lastTick=null;state.totalElapsed=0;state.isDone=false;state.sheetLog=null;
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(tick,1000);
  renderOperator();
}

// ========== RENDER: OPERATOR ==========
function renderOperator(){
  const j=state.job;
  const estTotalSec=(j.estSetup+j.estCycle)*60;
  $('app').innerHTML=`
  <div class="header fade-in">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="back-btn" onclick="goBack()">&#8592; Back</button>
      <span style="font-size:13px;color:var(--muted)">Production code:</span>
      <span class="orb" style="font-size:16px;color:var(--gold);letter-spacing:2px">${esc(state.prodCode)}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="live-dot" id="live-dot" style="background:var(--dim)"></span>
      <span id="status-text" style="font-size:12px;color:var(--muted)">Waiting</span>
    </div>
  </div>

  <div class="info-grid fade-in d1">
    <div class="info-cell"><div class="info-label">IE number</div><div class="info-value gold mono">${esc(j.ie)}</div></div>
    <div class="info-cell"><div class="info-label">Client</div><div class="info-value">${esc(j.client)}</div></div>
    <div class="info-cell"><div class="info-label">Part</div><div class="info-value">${esc(j.part)}</div></div>
    <div class="info-cell"><div class="info-label">Machine</div><div class="info-value cyan mono">${esc(j.machine)}</div></div>
    <div class="info-cell"><div class="info-label">Qty</div><div class="info-value">${j.qty}</div></div>
    <div class="info-cell"><div class="info-label">Operation</div><div class="info-value purple mono">${esc(j.op)}</div></div>
  </div>

  <div style="padding:0 20px;background:var(--bg2);border-bottom:1px solid var(--border);padding-bottom:12px" class="fade-in d2">
    <div class="est-row">
      <div class="est-item">Est. setup: <span style="color:var(--purple)">${fmtHM(j.estSetup)}</span></div>
      <div class="est-item">Est. cycle: <span style="color:var(--cyan)">${fmtHM(j.estCycle)}</span></div>
      <div style="margin-left:auto"><a href="${esc(j.drgLink)}" target="_blank" class="drg-link">View drawing</a></div>
    </div>
  </div>

  <div class="main-timer-wrap fade-in d2">
    <div class="main-timer-label mono">Total elapsed time</div>
    <div class="main-timer orb idle" id="main-timer">00:00:00</div>
    <div id="status-badge-wrap"></div>
  </div>

  <div class="phase-grid fade-in d3">
    <div class="phase-box" id="pb-setup" style="--pc:var(--purple)">
      <div class="phase-label">Setup</div>
      <div class="phase-time mono" id="pt-setup">00:00:00</div>
    </div>
    <div class="phase-box" id="pb-running" style="--pc:var(--cyan)">
      <div class="phase-label">Cycle</div>
      <div class="phase-time mono" id="pt-running">00:00:00</div>
    </div>
    <div class="phase-box" id="pb-qchold" style="--pc:var(--amber)">
      <div class="phase-label">QC hold</div>
      <div class="phase-time mono" id="pt-qchold">00:00:00</div>
    </div>
    <div class="phase-box" id="pb-breakdown" style="--pc:var(--red)">
      <div class="phase-label">Breakdown</div>
      <div class="phase-time mono" id="pt-breakdown">00:00:00</div>
    </div>
  </div>

  <div class="eff-wrap fade-in d4">
    <div class="eff-box">
      <div class="eff-header">
        <span class="eff-label mono">Efficiency vs estimate</span>
        <span class="eff-value orb" id="eff-pct" style="color:var(--dim)">---</span>
      </div>
      <div class="eff-bar"><div class="eff-fill" id="eff-fill" style="width:0%"></div></div>
      <div class="eff-marks mono"><span>0h</span><span id="eff-est">Est: ${fmtHM(j.estSetup+j.estCycle)}</span><span>${fmtHM(Math.round((j.estSetup+j.estCycle)*1.5))}</span></div>
    </div>
  </div>

  <div class="btn-grid fade-in d4">
    <button class="action-btn" id="btn-setup" style="--bc:var(--purple)" onclick="startPhase('setup')">Start setup</button>
    <button class="action-btn" id="btn-running" style="--bc:var(--cyan)" onclick="startPhase('running')">Start job</button>
    <button class="action-btn" id="btn-qchold" style="--bc:var(--amber)" onclick="startPhase('qchold')">QC hold</button>
    <button class="action-btn" id="btn-breakdown" style="--bc:var(--red)" onclick="startPhase('breakdown')">Breakdown</button>
  </div>
  <button class="end-btn" id="btn-end" onclick="endJob()" disabled>End job</button>

  <div id="sheet-log-area"></div>`;
  updateOperatorUI();
}

function updateTimerDisplay(){
  const mt=$('main-timer');if(!mt)return;
  const j=state.job;
  const estTotalSec=(j.estSetup+j.estCycle)*60;
  mt.textContent=fmt(state.totalElapsed);
  mt.className='main-timer orb'+(state.isDone?' done':state.totalElapsed>estTotalSec?' overrun':state.activePhase?'':' idle');
  ['setup','running','qchold','breakdown'].forEach(p=>{
    const el=$('pt-'+p);if(el)el.textContent=fmt(state.phases[p]);
  });
  // efficiency
  const eff=state.totalElapsed>0?Math.round((estTotalSec/state.totalElapsed)*100):0;
  const effEl=$('eff-pct');
  if(effEl&&state.totalElapsed>0){
    effEl.textContent=eff+'%';
    effEl.style.color=eff>=90?'var(--green)':eff>=70?'var(--amber)':'var(--red)';
  }
  const fillEl=$('eff-fill');
  if(fillEl){
    const pct=Math.min(100,(state.totalElapsed/estTotalSec)*100);
    fillEl.style.width=pct+'%';
    fillEl.style.background=eff>=90?'var(--green)':eff>=70?'var(--amber)':'var(--red)';
  }
}

function updateOperatorUI(){
  // phase boxes
  ['setup','running','qchold','breakdown'].forEach(p=>{
    const box=$('pb-'+p);if(!box)return;
    box.className='phase-box'+(state.activePhase===p?' active':'');
  });
  // buttons
  ['setup','running','qchold','breakdown'].forEach(p=>{
    const btn=$('btn-'+p);if(!btn)return;
    const active=state.activePhase===p;
    btn.className='action-btn'+(active?' active':'');
    btn.disabled=state.isDone;
    const labels={setup:['Start setup','Setup running...'],running:['Start job','Cutting...'],qchold:['QC hold','QC hold...'],breakdown:['Breakdown','Breakdown...']};
    btn.textContent=active?labels[p][1]:labels[p][0];
  });
  // end button
  const endBtn=$('btn-end');
  if(endBtn){
    endBtn.disabled=state.isDone||!state.activePhase;
    endBtn.className='end-btn'+(state.isDone?' done':'');
    endBtn.textContent=state.isDone?'Job completed':'End job';
  }
  // status
  const dot=$('live-dot');
  const stxt=$('status-text');
  if(dot&&stxt){
    if(state.isDone){dot.style.background='var(--green)';stxt.style.color='var(--green)';stxt.textContent='Completed';}
    else if(state.activePhase){const c=COLORS[state.activePhase];dot.style.background=c.color;stxt.style.color=c.color;stxt.textContent=c.label;}
    else{dot.style.background='var(--dim)';stxt.style.color='var(--muted)';stxt.textContent='Waiting';}
  }
  // status badge
  const bw=$('status-badge-wrap');
  if(bw&&state.activePhase&&!state.isDone){
    const c=COLORS[state.activePhase];
    bw.innerHTML=`<span class="status-badge" style="color:${c.color};border-color:${c.color};background:${c.bg}">${c.label}</span>`;
  }else if(bw&&state.isDone){
    bw.innerHTML=`<span class="status-badge" style="color:var(--green);border-color:var(--green);background:var(--green-g)">Completed</span>`;
  }else if(bw){bw.innerHTML='';}
  // timer display
  updateTimerDisplay();
  // sheet log
  if(state.sheetLog){
    const s=state.sheetLog;
    const logArea=$('sheet-log-area');
    if(logArea){
      logArea.innerHTML=`
      <div class="sheet-log fade-in">
        <h3>${s.sent?'Data sent to Google Sheet':'Data ready to send'}</h3>
        <table class="sheet-table"><thead><tr>
          <th>IE no.</th><th>Machine</th><th>Operator</th><th>Setup</th><th>Cycle</th><th>QC hold</th><th>Breakdown</th><th>Total</th><th>Efficiency</th>
        </tr></thead><tbody><tr>
          <td class="val-gold mono">${esc(s.ie)}</td><td>${esc(s.machine)}</td><td>${esc(s.operator)}</td>
          <td class="val-purple">${fmtSec(s.setup)}</td><td class="val-cyan">${fmtSec(s.cycle)}</td>
          <td class="val-amber">${fmtSec(s.qchold)}</td><td class="val-red">${fmtSec(s.breakdown)}</td>
          <td style="font-weight:700">${fmtSec(s.total)}</td>
          <td class="${s.efficiency>=90?'val-green':s.efficiency>=70?'val-amber':'val-red'}" style="font-weight:900;font-size:14px">${s.efficiency}%</td>
        </tr></tbody></table>
        <p style="font-size:11px;color:var(--dim);margin-top:10px;line-height:1.7">
          Production code <span class="mono val-gold">${esc(s.prodCode)}</span> links this data to IE-PD-10 (First Pass Yield) and MC HR Rate Sheet.
          ${s.error?'<br><span style="color:var(--red)">WiFi error &mdash; data saved locally. Will retry when connection restores.</span>':''}
          ${s.sent?'<br><span style="color:var(--green)">Successfully logged to Google Sheet.</span>':''}
        </p>
      </div>`;
    }
  }
}

function goBack(){
  if(tickInterval)clearInterval(tickInterval);
  state.view='supervisor';state.prodCode=null;state.job=null;
  state.activePhase=null;state.isDone=false;state.sheetLog=null;
  renderSupervisor();
}

// ========== URL PARAM: auto-load job ==========
function init(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(code){
    // Try to fetch from API first
    if(API_URL){
      fetch(API_URL+'?action=getJob&code='+encodeURIComponent(code))
        .then(r=>r.json()).then(d=>{
          if(d.success&&d.job){
            const j=d.job;
            SAMPLE_JOBS[code]={ie:j.ieNumber,client:j.clientName,part:j.partName,qty:j.qty,
              op:j.operation,machine:j.machine,estSetup:j.estSetupMin,estCycle:j.estCycleMin,
              drgLink:j.drawingLink||'#',operator:j.operator};
          }
          openOperator(code);
        }).catch(()=>openOperator(code));
    }else if(SAMPLE_JOBS[code]){
      openOperator(code);
    }else{
      renderSupervisor();
    }
  }else{
    renderSupervisor();
  }
}

init();
</script>
</body>
</html>
